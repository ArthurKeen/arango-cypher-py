name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration and not tck" --tb=short -q

  integration:
    runs-on: ubuntu-latest
    services:
      arangodb:
        image: arangodb/arangodb:3.11
        env:
          ARANGO_ROOT_PASSWORD: openSesame
        ports:
          - 28529:8529
        options: >-
          --health-cmd "wget -qO- --header='Content-Type: application/json' --post-data '{\"username\":\"root\",\"password\":\"openSesame\"}' http://127.0.0.1:8529/_open/auth >/dev/null 2>&1"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 40
    env:
      ARANGO_URL: http://localhost:28529
      ARANGO_USER: root
      ARANGO_PASS: openSesame
      ARANGO_DB: _system
      RUN_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -m integration --tb=short -q
