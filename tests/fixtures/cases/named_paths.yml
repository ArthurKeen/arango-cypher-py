version: 1
cases:
  - id: C320
    name: named path basic
    mapping_fixture: pg
    extensions_enabled: false
    cypher: |
      MATCH p = (u:User)-[:FOLLOWS]->(f:User) RETURN p
    expected:
      aql: |
        WITH docs, persons, places, users
        FOR u IN @@uCollection
          FOR f, r IN 1..1 OUTBOUND u @@edgeCollection
            FILTER IS_SAME_COLLECTION(@vCollection, f)
            LET p = {nodes: [u, f], edges: [r]}
            RETURN p
      bind_vars:
        "@uCollection": users
        "@edgeCollection": follows
        vCollection: users

