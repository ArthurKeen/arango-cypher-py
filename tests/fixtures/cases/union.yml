version: 1
cases:
- id: C212
  name: UNION (distinct) two branches same collection
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (n:User) WHERE n.active = true RETURN n.name AS name UNION MATCH (n:User) WHERE n.admin = true RETURN n.name AS name

    '
  expected:
    aql: "FOR _u IN UNION_DISTINCT(\n  (FOR n IN @@collection\n  FILTER (n.active == true)\n  RETURN {name: n.name}),\n  (FOR n IN @@collection\n  FILTER (n.admin == true)\n  RETURN {name: n.name})\n  )\n\
      \  RETURN _u"
    bind_vars:
      '@collection': users
- id: C213
  name: UNION ALL two branches same collection
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (n:User) RETURN n.name AS name UNION ALL MATCH (n:User) RETURN n.id AS name

    '
  expected:
    aql: "FOR _u IN UNION(\n  (FOR n IN @@collection\n  RETURN {name: n.name}),\n  (FOR n IN @@collection\n  RETURN {name: n.id})\n  )\n  RETURN _u"
    bind_vars:
      '@collection': users
