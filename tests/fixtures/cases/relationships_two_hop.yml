version: 1
cases:
- id: C066
  name: two hop follows traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User)-[:FOLLOWS]->(w:User)

    RETURN u.id, w.id

    ORDER BY u.id, w.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR w, r_1, _path IN 2..2 OUTBOUND u @@edgeCollection\n    LET v = _path.vertices[1]\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n\
      \    FILTER IS_SAME_COLLECTION(@vCollection2, w)\n    SORT u.id, w.id\n    RETURN {id: u.id, w_id: w.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
      vCollection2: users
