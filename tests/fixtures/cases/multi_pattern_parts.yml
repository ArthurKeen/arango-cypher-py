version: 1
cases:
- id: C045
  name: two independent node patterns cartesian
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User), (v:User)

    RETURN u.id, v.id

    ORDER BY u.id, v.id

    LIMIT 3

    '
  expected:
    aql: "FOR u IN @@collection\n  FOR v IN @@collection2\n    SORT u.id, v.id\n    LIMIT 3\n    RETURN {id: u.id, v_id: v.id}"
    bind_vars:
      '@collection': users
      '@collection2': users
- id: C046
  name: shared variable join with 1-hop traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User), (u)-[:FOLLOWS]->(v:User)

    RETURN u.id, v.id

    ORDER BY u.id, v.id

    LIMIT 5

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    SORT u.id, v.id\n    LIMIT 5\n   \
      \ RETURN {id: u.id, v_id: v.id}"
    bind_vars:
      '@collection': users
      '@edgeCollection': follows
      vCollection: users
- id: C047
  name: shared intermediate variable across traversals (2 pattern parts)
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User), (v)-[:FOLLOWS]->(w:User)

    RETURN u.id, w.id

    ORDER BY u.id, w.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FOR w, r2 IN 1..1 OUTBOUND v @@edgeCollection2\n\
      \      FILTER IS_SAME_COLLECTION(@wCollection, w)\n      SORT u.id, w.id\n      RETURN {id: u.id, w_id: w.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
      '@edgeCollection2': follows
      wCollection: users
- id: C053
  name: distinct order skip limit in multi pattern parts
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User), (v:User)

    RETURN DISTINCT v.city

    ORDER BY v.city

    SKIP 1

    LIMIT 1

    '
  expected:
    aql: "FOR u IN @@collection\n  FOR v IN @@collection2\n    COLLECT city = v.city\n    SORT city\n    LIMIT 1, 1\n    RETURN city"
    bind_vars:
      '@collection': users
      '@collection2': users
- id: C060
  name: shared end node across pattern parts (id equality join)
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User), (w:User)-[:FOLLOWS]->(v)

    RETURN u.id, w.id, v.id

    ORDER BY u.id, w.id, v.id

    LIMIT 10

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FOR w IN @@wCollection\n      FOR\
      \ v_m, r2 IN 1..1 OUTBOUND w @@edgeCollection2\n        FILTER v_m._id == v._id\n        SORT u.id, w.id, v.id\n        LIMIT 10\n        RETURN {id: u.id, w_id: w.id, v_id: v.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
      '@wCollection': users
      '@edgeCollection2': follows
