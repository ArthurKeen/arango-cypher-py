version: 1
cases:
- id: C037
  name: with passthrough then traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH u

    MATCH (u)-[:FOLLOWS]->(v:User)

    RETURN u.id, v.id

    ORDER BY u.id, v.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    SORT u.id, v.id\n    RETURN {id: u.id,\
      \ v_id: v.id}"
    bind_vars:
      '@collection': users
      '@edgeCollection': follows
      vCollection: users
- id: C038
  name: with where then distinct traversal cities skip
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH u WHERE u.active = true

    MATCH (u)-[:FOLLOWS]->(v:User)

    RETURN DISTINCT v.city

    ORDER BY v.city

    SKIP 1

    LIMIT 1

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  FILTER (u.active == true)\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    COLLECT\
      \ city = v.city\n    SORT city\n    LIMIT 1, 1\n    RETURN city"
    bind_vars:
      '@collection': users
      '@edgeCollection': follows
      vCollection: users
- id: C039
  name: with alias and passthrough then traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH u.name AS name, u

    MATCH (u)-[:FOLLOWS]->(v:User)

    RETURN name, v.name

    ORDER BY name, v.name

    LIMIT 5

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  LET name = u.name\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    SORT name, v.name\n\
      \    LIMIT 5\n    RETURN {name: name, v_name: v.name}"
    bind_vars:
      '@collection': users
      '@edgeCollection': follows
      vCollection: users
- id: C040
  name: with aggregation then traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User)

    WITH u, count(v) AS degree

    MATCH (u)-[:FOLLOWS]->(w:User)

    RETURN u.id, degree, w.id

    ORDER BY u.id, w.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    COLLECT u_1 = u AGGREGATE degree\
      \ = COUNT(v)\n    FOR w, r_1 IN 1..1 OUTBOUND u_1 @@edgeCollection2\n      FILTER IS_SAME_COLLECTION(@vCollection2, w)\n      SORT u_1.id, w.id\n      RETURN {id: u_1.id, degree: degree, w_id: w.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
      '@edgeCollection2': follows
      vCollection2: users
- id: C041
  name: with distinct scalar then fresh match
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH DISTINCT u.city AS city

    MATCH (x:User)

    WHERE x.city = city

    RETURN city, x.id

    ORDER BY city, x.id

    '
  expected:
    aql: "FOR u IN @@collection\n  COLLECT city = u.city\n  FOR x IN @@tailCollection\n    FILTER (x.city == city)\n    SORT city, x.id\n    RETURN {city: city, id: x.id}"
    bind_vars:
      '@collection': users
      '@tailCollection': users
- id: C042
  name: with distinct scalar then fresh match traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH DISTINCT u.city AS city

    MATCH (x:User)-[:FOLLOWS]->(y:User)

    WHERE x.city = city

    RETURN city, y.id

    ORDER BY city, y.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  COLLECT city = u.city\n  FOR x IN @@tailCollection\n    FOR y, r IN 1..1 OUTBOUND x @@edgeCollection\n      FILTER IS_SAME_COLLECTION(@vCollection,\
      \ y)\n      FILTER (x.city == city)\n      SORT city, y.id\n      RETURN {city: city, id: y.id}"
    bind_vars:
      '@collection': users
      '@tailCollection': users
      '@edgeCollection': follows
      vCollection: users
- id: C043
  name: tail match relationship var type
  mapping_fixture: lpg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH u

    MATCH (u)-[r:FOLLOWS]->(v:User)

    RETURN type(r), u.id, v.id

    ORDER BY u.id, v.id

    '
  expected:
    aql: "WITH vertices\nFOR u IN @@collection\n  FILTER u[@typeField] == @typeValue\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FILTER v[@vTypeField]\
      \ == @vTypeValue\n    FILTER r[@relTypeField] == @relTypeValue\n    SORT u.id, v.id\n    RETURN {type: r[@relTypeField], id: u.id, v_id: v.id}"
    bind_vars:
      '@collection': vertices
      typeField: type
      typeValue: User
      '@edgeCollection': edges
      vCollection: vertices
      vTypeField: type
      vTypeValue: User
      relTypeField: type
      relTypeValue: FOLLOWS
- id: C044
  name: tail match two hop traversal
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)

    WITH u

    MATCH (u)-[:FOLLOWS]->(v:User)-[:FOLLOWS]->(w:User)

    RETURN u.id, w.id

    ORDER BY u.id, w.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@collection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FOR w, r_1 IN 1..1 OUTBOUND v @@edgeCollection2\n\
      \      FILTER IS_SAME_COLLECTION(@vCollection2, w)\n      SORT u.id, w.id\n      RETURN {id: u.id, w_id: w.id}"
    bind_vars:
      '@collection': users
      '@edgeCollection': follows
      vCollection: users
      '@edgeCollection2': follows
      vCollection2: users
