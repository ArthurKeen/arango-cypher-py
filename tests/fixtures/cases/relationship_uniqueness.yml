version: 1
cases:
- id: C720
  name: two named rels get uniqueness filter
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (a:User)-[r1:FOLLOWS]->(b:User)-[r2:FOLLOWS]->(c:User) RETURN a.id, c.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR a IN @@uCollection\n  FOR c, r2,\
      \ _path IN 2..2 OUTBOUND a @@edgeCollection\n    LET b = _path.vertices[1]\n\
      \    LET r1 = _path.edges[0]\n    FILTER IS_SAME_COLLECTION(@vCollection, b)\n\
      \    FILTER IS_SAME_COLLECTION(@vCollection2, c)\n    FILTER r1._id != r2._id\n\
      \    RETURN {id: a.id, c_id: c.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
      vCollection2: users
- id: C721
  name: multi-pattern two named rels get uniqueness filter
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (a:User)-[r1:FOLLOWS]->(b:User), (b)-[r2:FOLLOWS]->(c:User) RETURN a.id, b.id, c.id

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR a IN @@aCollection\n  FOR b, r1 IN\
      \ 1..1 OUTBOUND a @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@bCollection,\
      \ b)\n    FOR c, r2 IN 1..1 OUTBOUND b @@edgeCollection2\n      FILTER IS_SAME_COLLECTION(@cCollection,\
      \ c)\n      FILTER r1._id != r2._id\n      RETURN {id: a.id, b_id: b.id, c_id:\
      \ c.id}"
    bind_vars:
      '@aCollection': users
      '@edgeCollection': follows
      bCollection: users
      '@edgeCollection2': follows
      cCollection: users
