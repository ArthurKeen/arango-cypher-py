version: 1
cases:
- id: C235
  name: return id function
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (n:Person) RETURN id(n)

    '
  expected:
    aql: "FOR n IN @@collection\n  RETURN n._id\n"
    bind_vars:
      '@collection': persons
