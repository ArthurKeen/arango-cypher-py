  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User) WHERE u.id = $id RETURN v

    '
  params:
    id: u1
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FILTER (u.id == @id)\n    RETURN\
      \ v"
    bind_vars:
      id: u1
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
