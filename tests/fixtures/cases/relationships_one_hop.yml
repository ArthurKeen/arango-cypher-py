version: 1
cases:
- id: C011
  name: outbound follows one hop
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User) RETURN u, v LIMIT 5

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    LIMIT 5\n    RETURN {u: u, v: v}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
- id: C012
  name: inbound follows one hop
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)<-[:FOLLOWS]-(v:User) RETURN u, v

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 INBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    RETURN {u: u, v: v}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
- id: C013
  name: undirected follows one hop
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]-(v:User) RETURN u, v

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 ANY u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    RETURN {u: u, v: v}"
