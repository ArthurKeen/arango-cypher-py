- id: C058
  name: undirected follows ids with order and limit
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]-(v:User)

    RETURN u.id, v.id

    ORDER BY u.id, v.id

    LIMIT 3

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 ANY u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    SORT u.id, v.id\n    LIMIT 3\n    RETURN\
      \ {id: u.id, v_id: v.id}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
- id: C059
  name: type of relationship only
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[r:FOLLOWS]->(v:User)

    RETURN type(r)

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    RETURN {type: \"FOLLOWS\"}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
