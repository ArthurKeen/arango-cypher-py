- id: C018
  name: boolean conjunction across nodes
  mapping_fixture: pg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User)

    WHERE u.active = true AND v.active = true

    RETURN u, v

    '
  expected:
    aql: "WITH docs, persons, places, users\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FILTER ((u.active == true) AND (v.active\
      \ == true))\n    RETURN {u: u, v: v}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': follows
      vCollection: users
- id: C031
  name: outbound follows one hop (LPG generic edges)
  mapping_fixture: lpg
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User) RETURN u, v LIMIT 5

    '
  expected:
    aql: "WITH vertices\nFOR u IN @@uCollection\n  FILTER u[@uTypeField] == @uTypeValue\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FILTER v[@vTypeField]\
      \ == @vTypeValue\n    FILTER r[@relTypeField] == @relTypeValue\n    LIMIT 5\n    RETURN {u: u, v: v}"
    bind_vars:
      '@uCollection': vertices
      '@edgeCollection': edges
      vCollection: vertices
      uTypeField: type
      uTypeValue: User
      vTypeField: type
      vTypeValue: User
      relTypeField: type
      relTypeValue: FOLLOWS
- id: C032
  name: outbound follows one hop (hybrid generic edges)
  mapping_fixture: hybrid
  extensions_enabled: false
  cypher: 'MATCH (u:User)-[:FOLLOWS]->(v:User) RETURN u, v LIMIT 5

    '
  expected:
    aql: "WITH users, vertices\nFOR u IN @@uCollection\n  FOR v, r IN 1..1 OUTBOUND u @@edgeCollection\n    FILTER IS_SAME_COLLECTION(@vCollection, v)\n    FILTER r[@relTypeField] == @relTypeValue\n   \
      \ LIMIT 5\n    RETURN {u: u, v: v}"
    bind_vars:
      '@uCollection': users
      '@edgeCollection': edges
      vCollection: users
      relTypeField: type
      relTypeValue: FOLLOWS
